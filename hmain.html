<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jasman Kaur — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
/* ===== DESIGN TOKENS ===== */
:root {
  --bg-1: #eaf4fb;
  --bg-2: #e9e2f7;
  --bg-3: #d8c8f0;
  --cover: #8458b3;
  --cover-dark: #6b4097;
  --cover-spine: #5c3683;
  --paper: #eef5fc;
  --paper-shade: #ddeaf6;
  --ink: #f0ecff;
  --ink-soft: #b8c8e8;
  --accent: #7ecfef;
  --accent-soft: #5aadda;
  --gold: #d4ad6a;
  --line: rgba(200,220,245,0.18);
  --navy-1: #1b2440;
  --navy-2: #141b33;
  --navy-3: #0e1326;
  --navy-text: #c8daf0;
  --navy-text-dim: rgba(190,215,240,0.08);
  --navy-line: rgba(180,210,240,0.2);
  --book-ink: #1a2340;
  --book-ink-soft: #3a5070;
  --book-accent: #2a6faa;
  --book-line: rgba(30,60,110,0.12);
  --book-shade: #ddeaf6;
}

/* ===== RESET ===== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; font-family:"Inter",sans-serif; cursor:none; }

body {
  background: var(--navy-3);
  color: var(--ink);
  position: relative;
}
body.hero-active {
  background: radial-gradient(ellipse 90% 70% at 50% 30%, var(--navy-1) 0%, var(--navy-2) 55%, var(--navy-3) 100%);
}

/* ===== CANVAS LAYERS ===== */
#cursor-canvas, #grid-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
}
#cursor-canvas { z-index: 9999; }
#grid-canvas   { z-index: 1; }

/* ===== CURSOR DOT ===== */
.cursor-dot {
  position: fixed; top:0; left:0;
  width:14px; height:14px;
  border-radius:50%;
  background: var(--cover);
  z-index:10000;
  pointer-events:none;
  transform:translate(-50%,-50%);
  transition: width .18s, height .18s, background .18s, opacity .18s;
  mix-blend-mode: screen;
}
.cursor-dot.hover {
  width:44px; height:44px;
  background: rgba(132,88,179,0.14);
  border: 1.5px solid var(--cover);
}

/* ===== AMBIENT GLOW ===== */
.bg-glow {
  position: fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(circle at 15% 20%, rgba(126,207,239,.18), transparent 40%),
    radial-gradient(circle at 85% 75%, rgba(132,88,179,.14), transparent 45%);
  transition: opacity .6s ease;
}
body.hero-active .bg-glow { opacity:0; }

/* cursor-following glow blob */
.cursor-glow {
  position: fixed;
  width: 420px; height: 420px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 2;
  transform: translate(-50%,-50%);
  background: radial-gradient(circle, rgba(132,88,179,.1) 0%, transparent 70%);
  transition: left .45s cubic-bezier(.25,.46,.45,.94), top .45s cubic-bezier(.25,.46,.45,.94);
  mix-blend-mode: screen;
}
.book-open-wrap.show ~ * .cursor-glow,
body:not(.hero-active) .cursor-glow { opacity: 0; }

/* ===== NAV ===== */
.nav {
  position: fixed; top:0; left:0; right:0; z-index:500;
  display:flex; align-items:center; justify-content:space-between;
  padding:22px 52px;
  opacity:0; transform:translateY(-16px);
  transition: opacity .7s ease, transform .7s ease;
  pointer-events:none;
  backdrop-filter: blur(0px);
  -webkit-backdrop-filter: blur(0px);
  background: transparent;
  border-bottom: 1px solid transparent;
}
.nav.show {
  opacity:1; transform:translateY(0); pointer-events:auto;
  backdrop-filter: blur(18px) saturate(1.4);
  -webkit-backdrop-filter: blur(18px) saturate(1.4);
  background: rgba(14,19,38,.55);
  border-bottom: 1px solid rgba(126,207,239,.08);
}
.nav-brand {
  font-family:"Fraunces",serif; font-weight:600; font-size:18px;
  letter-spacing:.02em; color:var(--ink);
  display:flex; align-items:center; gap:10px;
}
.nav-brand-dot {
  width:7px; height:7px; border-radius:50%;
  background: var(--cover);
  display:inline-block;
  box-shadow: 0 0 12px var(--cover);
  animation: pulseDot 2.4s ease-in-out infinite;
}
@keyframes pulseDot { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }
.nav-links { display:flex; gap:34px; }
.nav-link {
  font-size:11.5px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--ink-soft); cursor:none; background:none; border:none;
  font-family:"Inter",sans-serif; font-weight:500;
  position:relative; padding:4px 0;
  transition: color .2s;
}
.nav-link::after {
  content:""; position:absolute; left:0; bottom:0;
  height:1px; width:0; background:var(--accent);
  transition: width .3s ease;
}
.nav-link:hover { color:var(--ink); }
.nav-link:hover::after,
.nav-link.active::after { width:100%; }
.nav-link.active { color:var(--accent); }

/* ===== SCENE ===== */
.scene {
  position:relative; z-index:10; width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  perspective:2600px;
}

/* ===== HERO ===== */
.hero {
  position:absolute; inset:0; z-index:50;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition: opacity .8s ease, visibility .8s;
  overflow:hidden;
}
.hero.hidden { opacity:0; visibility:hidden; pointer-events:none; }

.hero-bg-text {
  position:absolute; top:6%; left:50%; transform:translateX(-50%);
  width:140%; text-align:center;
  font-family:"Fraunces",serif; font-weight:700;
  font-size:clamp(60px,13vw,190px); line-height:.85;
  color:transparent;
  -webkit-text-stroke: 1px var(--navy-text-dim);
  letter-spacing:-.01em; white-space:nowrap;
  pointer-events:none; user-select:none; z-index:1;
  opacity:0; animation:fadeUp 1.2s ease forwards; animation-delay:.05s;
}

.hero-eyebrow {
  font-family:"JetBrains Mono",monospace; font-size:11px;
  letter-spacing:.2em; text-transform:uppercase; color:var(--accent);
  margin-bottom:20px; position:relative; z-index:3;
  opacity:0; animation:fadeUp .9s ease forwards; animation-delay:.15s;
}

.hero-side-note {
  position:absolute; left:8%; top:38%; z-index:2;
  max-width:200px; font-family:"Inter",sans-serif;
  font-size:14px; line-height:1.5; color:var(--navy-text);
  opacity:0; animation:fadeUp 1s ease forwards; animation-delay:.7s;
  pointer-events:none;
}
.hero-side-note .rule {
  position:absolute; left:-24px; top:-30px; bottom:-180px;
  width:1px; background: linear-gradient(to bottom, transparent, var(--navy-line) 30%, var(--navy-line) 70%, transparent);
}
.hero-corner-note {
  position:absolute; top:24%; right:6%; z-index:2;
  font-family:"Fraunces",serif; font-style:italic; font-weight:500;
  font-size:clamp(13px,1.5vw,18px); color:var(--navy-text);
  opacity:0; animation:fadeUp 1s ease forwards; animation-delay:.9s;
  text-align:right; pointer-events:none; max-width:260px; line-height:1.5;
}

.hero-years {
  position:absolute; bottom:5%; left:0; right:0; z-index:2;
  display:flex; align-items:flex-end; justify-content:space-between;
  padding:0 5%; pointer-events:none; user-select:none;
}
.hero-year {
  font-family:"Fraunces",serif; font-weight:700;
  font-size:clamp(56px,10vw,140px); line-height:.8;
  color:transparent; -webkit-text-stroke:1px var(--navy-line);
  opacity:0; animation:fadeUp 1.1s ease forwards; animation-delay:.4s;
}
.hero-years-line {
  position:absolute; left:6%; right:6%; bottom:37%;
  height:1px; background:linear-gradient(to right, transparent, var(--navy-line) 20%, var(--navy-line) 80%, transparent);
  z-index:1; opacity:0; animation:fadeIn 1s ease forwards; animation-delay:.6s;
}

/* ===== BOOK CLOSED ===== */
.book-wrap {
  position:relative; z-index:3;
  opacity:0; animation:fadeUp 1s ease forwards; animation-delay:.55s;
}
.book-closed {
  width:300px; height:410px; position:relative;
  transform-style:preserve-3d;
  animation:float 4.5s ease-in-out infinite;
  cursor:none; transition: filter .3s ease;
}
.book-closed:hover { filter: drop-shadow(0 0 32px rgba(132,88,179,.5)); }
@keyframes float {
  0%,100%{transform:translateY(0) rotateZ(0deg) rotateY(0deg)}
  50%{transform:translateY(-12px) rotateZ(.6deg) rotateY(4deg)}
}

.book-stack {
  position:absolute; inset:0;
  border-radius:4px 10px 10px 4px;
  background:linear-gradient(100deg,var(--cover-spine) 0%,var(--cover) 12%,var(--cover) 88%,var(--cover-dark) 100%);
  box-shadow:
    0 40px 80px -20px rgba(0,0,0,.6),
    0 15px 35px -10px rgba(0,0,0,.4),
    inset -2px 0 0 rgba(255,255,255,.06),
    inset 0 0 60px rgba(132,88,179,.15);
}

.book-pages-edge {
  position:absolute; right:-5px; top:6px; bottom:6px; width:10px;
  background: repeating-linear-gradient(to bottom,#eef5fc 0,#eef5fc 2px,#cce0f2 2px,#cce0f2 3px);
  border-radius:0 6px 6px 0;
}

.book-cover-art {
  position:absolute; inset:0; border-radius:4px 10px 10px 4px;
  overflow:hidden; display:flex; flex-direction:column;
  align-items:center; justify-content:center; text-align:center;
}
.book-cover-illustration { position:absolute; inset:0; width:100%; height:100%; }
.book-cover-veil {
  position:absolute; inset:0;
  background:linear-gradient(180deg,rgba(27,36,64,.55) 0%,rgba(27,36,64,.2) 35%,rgba(27,36,64,.55) 75%,rgba(27,36,64,.9) 100%);
}
.book-cover-content { position:relative; z-index:2; padding:24px; }
.book-cover-emblem {
  width:44px; height:44px;
  border:1.5px solid rgba(255,255,255,.55); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  margin:0 auto 14px;
  font-family:"Fraunces",serif; font-size:16px; color:#fffdf9;
  background:rgba(27,36,64,.3);
  box-shadow:0 0 20px rgba(132,88,179,.3);
}
.book-cover-mono {
  font-family:"Fraunces",serif; font-style:italic; font-size:11px;
  color:rgba(255,255,255,.75); letter-spacing:.06em; margin-bottom:10px;
}
.book-cover-name {
  font-family:"Fraunces",serif; font-weight:700; font-size:30px;
  color:#fffdf9; line-height:1.1; text-shadow:0 2px 14px rgba(0,0,0,.4);
}
.book-cover-role {
  font-size:10px; letter-spacing:.18em; text-transform:uppercase;
  color:rgba(255,255,255,.7); margin-top:14px;
}

/* sheen overlay */
.book-closed::after {
  content:"";
  position:absolute; inset:0;
  border-radius:4px 10px 10px 4px;
  background:linear-gradient(120deg,rgba(255,255,255,.08) 0%,transparent 50%,rgba(255,255,255,.04) 100%);
  pointer-events:none;
}

/* ===== OPEN BOOK WRAP ===== */
.book-open-wrap {
  position:absolute; inset:0; z-index:40;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transform:scale(.92);
  pointer-events:none;
  transition: opacity .7s ease .15s, transform .7s ease .15s;
}
.book-open-wrap.show {
  opacity:1; transform:scale(1); pointer-events:auto;
}

.book {
  position:relative;
  width:min(900px,88vw); height:min(570px,74vh);
  display:flex; transform-style:preserve-3d;
}

/* central spine shadow */
.book-base {
  position:absolute; inset:0; display:flex;
  border-radius:6px;
  box-shadow:
    0 50px 100px -30px rgba(91,54,131,.45),
    0 18px 40px -15px rgba(91,54,131,.25),
    0 4px 12px rgba(0,0,0,.2);
}
.book-base::before {
  content:"";
  position:absolute; left:50%; top:-2%; bottom:-2%;
  width:40px; margin-left:-20px;
  background:linear-gradient(to right,rgba(20,10,40,.12),rgba(20,10,40,0) 40%,rgba(20,10,40,0) 60%,rgba(20,10,40,.12));
  z-index:30; pointer-events:none;
}

.page-static {
  width:50%; height:100%; background:var(--paper); position:relative; overflow:hidden;
}
.page-static.left  { border-radius:6px 0 0 6px; }
.page-static.right { border-radius:0 6px 6px 0; }

/* ruled lines on pages */
.page-static::after, .leaf-face::after {
  content:"";
  position:absolute; inset:0;
  background:repeating-linear-gradient(to bottom, transparent 0, transparent 27px, rgba(42,111,170,.06) 27px, rgba(42,111,170,.06) 28px);
  pointer-events:none; z-index:0;
}

/* ===== LEAVES (page-flip) ===== */
.leaf {
  position:absolute; top:0; right:0; width:50%; height:100%;
  transform-style:preserve-3d; transform-origin:left center;
  transition: transform .95s cubic-bezier(.65,0,.35,1);
  z-index:10;
}
.leaf.flipped { transform:rotateY(-180deg); }

.leaf-face {
  position:absolute; inset:0; background:var(--paper);
  -webkit-backface-visibility:hidden; backface-visibility:hidden;
  overflow:hidden; box-shadow:inset 1px 0 0 var(--book-line);
}
.leaf-front { border-radius:0 6px 6px 0; }
.leaf-back {
  transform:rotateY(180deg); border-radius:6px 0 0 6px;
  box-shadow:inset -1px 0 0 var(--book-line);
}

/* page reveal animation */
.page-content.revealed .page-tag    { animation: slideUp .4s ease .05s both; }
.page-content.revealed .page-h      { animation: slideUp .4s ease .12s both; }
.page-content.revealed .page-text   { animation: slideUp .4s ease .18s both; }
.page-content.revealed .toc-item    { animation: slideUp .35s ease calc(.1s + var(--i, 0) * .06s) both; }
.page-content.revealed .project-card{ animation: slideUp .4s ease calc(.12s + var(--i, 0) * .08s) both; }
.page-content.revealed .skill-row   { animation: slideUp .4s ease .22s both; }
.page-content.revealed .contact-link{ animation: slideUp .35s ease calc(.1s + var(--i, 0) * .07s) both; }
.page-content.revealed .about-portrait { animation: fadeIn .5s ease .05s both; }
@keyframes slideUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ===== PAGE CONTENT ===== */
.page-content {
  position:relative; z-index:1;
  width:100%; height:100%; padding:44px 40px 34px;
  display:flex; flex-direction:column; overflow-y:auto; color:var(--book-ink);
}
.page-content::-webkit-scrollbar { width:3px; }
.page-content::-webkit-scrollbar-thumb { background:rgba(42,111,170,.2); border-radius:2px; }

.page-tag {
  font-family:"JetBrains Mono",monospace; font-size:10.5px;
  letter-spacing:.16em; text-transform:uppercase; color:var(--book-accent);
  margin-bottom:10px;
}
.page-h {
  font-family:"Fraunces",serif; font-weight:600; font-size:29px;
  color:var(--book-ink); margin-bottom:18px; line-height:1.1;
}
.page-text {
  font-size:13.5px; line-height:1.72; color:var(--book-ink-soft); margin-bottom:14px;
}
.page-text strong { color:var(--book-ink); font-weight:600; }
.page-num {
  position:absolute; bottom:14px;
  font-family:"JetBrains Mono",monospace; font-size:10px;
  color:var(--book-accent); letter-spacing:.05em; opacity:.65;
}
.page-num.l { left:40px; }
.page-num.r { right:40px; }

/* ===== TOC ===== */
.toc-list { margin-top:6px; }
.toc-item {
  display:flex; align-items:baseline; gap:10px; padding:10px 0;
  cursor:none; font-size:13.5px; color:var(--book-ink-soft);
  border-bottom:1px dotted rgba(42,111,170,.18);
  transition: color .2s;
}
.toc-item:hover { color:var(--book-accent); }
.toc-item:hover .num { color:var(--book-ink); }
.toc-item .dots { flex:1; border-bottom:1px dotted rgba(42,111,170,.18); transform:translateY(-4px); }
.toc-item .num { font-family:"JetBrains Mono",monospace; font-size:10.5px; color:var(--book-accent); }

/* ===== ABOUT ===== */
.about-portrait {
  width:60px; height:60px; border-radius:50%;
  background:linear-gradient(135deg,var(--accent-soft),var(--accent));
  display:flex; align-items:center; justify-content:center;
  font-family:"Fraunces",serif; font-size:21px; color:#fff;
  margin-bottom:16px;
  box-shadow:0 4px 20px rgba(90,173,218,.3);
}
.stat-row {
  display:flex; gap:20px; margin:14px 0 4px;
}
.stat-item { display:flex; flex-direction:column; }
.stat-num {
  font-family:"Fraunces",serif; font-size:24px; font-weight:600;
  color:var(--book-accent); line-height:1;
}
.stat-label {
  font-family:"JetBrains Mono",monospace; font-size:9px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--book-ink-soft); margin-top:2px;
}

/* ===== CURRENTLY — timeline ===== */
.timeline { margin-top:4px; }
.tl-item {
  display:flex; gap:14px; padding:10px 0;
  border-bottom:1px solid rgba(42,111,170,.1);
}
.tl-item:last-child { border-bottom:none; }
.tl-dot-col { display:flex; flex-direction:column; align-items:center; padding-top:3px; }
.tl-dot {
  width:10px; height:10px; border-radius:50%;
  background:var(--book-accent); flex-shrink:0;
  box-shadow:0 0 0 3px rgba(42,111,170,.15);
}
.tl-dot.active { background:var(--accent-soft); box-shadow:0 0 0 3px rgba(90,173,218,.2); }
.tl-dot-line { flex:1; width:1px; background:rgba(42,111,170,.15); margin-top:4px; }
.tl-body { flex:1; padding-bottom:2px; }
.tl-title { font-size:13px; font-weight:600; color:var(--book-ink); margin-bottom:3px; }
.tl-sub { font-size:12px; color:var(--book-ink-soft); line-height:1.55; }

/* ===== PROJECTS ===== */
.project-card {
  border:1px solid rgba(42,111,170,.15); border-radius:8px;
  padding:15px 17px; margin-bottom:11px;
  background:rgba(220,237,250,.45);
  transition: border-color .2s, transform .2s, box-shadow .2s;
}
.project-card:hover {
  border-color:rgba(42,111,170,.35);
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(42,111,170,.1);
}
.project-name {
  font-family:"Fraunces",serif; font-weight:600; font-size:16px;
  color:var(--book-ink); margin-bottom:4px;
}
.project-stack {
  font-family:"JetBrains Mono",monospace; font-size:9.5px;
  color:var(--book-accent); margin-bottom:6px; letter-spacing:.05em;
}
.project-desc { font-size:12.5px; color:var(--book-ink-soft); line-height:1.55; }

/* ===== SKILLS ===== */
.skill-group-label {
  font-family:"JetBrains Mono",monospace; font-size:10px;
  letter-spacing:.12em; text-transform:uppercase; color:var(--book-accent);
  margin:14px 0 5px;
}
.skill-row { display:flex; flex-wrap:wrap; gap:7px; margin-top:5px; margin-bottom:16px; }
.skill-chip {
  font-size:11px; padding:5px 11px; border-radius:20px;
  background:var(--book-shade); border:1px solid rgba(42,111,170,.2);
  color:var(--book-ink); font-weight:500;
  transition: background .2s, border-color .2s, transform .2s;
}
.skill-chip:hover { background:rgba(42,111,170,.12); border-color:rgba(42,111,170,.4); transform:translateY(-1px); }

/* ===== CONTACT ===== */
.contact-link {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 0; border-bottom:1px solid rgba(42,111,170,.12);
  font-size:13px; color:var(--book-ink); text-decoration:none; cursor:none;
  transition: color .2s, padding-left .2s;
}
.contact-link:hover { color:var(--book-accent); padding-left:4px; }
.contact-link span:last-child {
  color:var(--book-accent); font-family:"JetBrains Mono",monospace;
  font-size:10.5px;
}

/* ===== CORNER FLIP HINTS ===== */
.corner {
  position:absolute; width:52px; height:52px; cursor:none; z-index:60;
  display:flex; align-items:center; justify-content:center;
}
.corner.next { right:4px; bottom:4px; }
.corner.prev { left:4px;  bottom:4px; }
.corner-fold {
  position:absolute; inset:0;
  background:linear-gradient(135deg,transparent 50%,rgba(42,111,170,.15) 50%);
  border-radius:0 0 8px 0; opacity:0;
  transition: opacity .25s ease;
}
.corner.prev .corner-fold {
  background:linear-gradient(225deg,transparent 50%,rgba(42,111,170,.15) 50%);
  border-radius:0 0 0 8px;
}
.corner:hover .corner-fold { opacity:1; }
.corner-label {
  font-family:"JetBrains Mono",monospace; font-size:8.5px;
  letter-spacing:.06em; color:var(--book-accent); opacity:0;
  position:absolute; white-space:nowrap;
  transition: opacity .25s ease;
}
.corner.next .corner-label { bottom:6px; right:6px; text-align:right; }
.corner.prev .corner-label { bottom:6px; left:6px; }
.corner:hover .corner-label { opacity:.8; }

/* ===== CLOSE BTN ===== */
.book-close {
  position:absolute; top:-42px; right:0;
  font-family:"JetBrains Mono",monospace; font-size:10.5px;
  letter-spacing:.1em; text-transform:uppercase;

    <script>
/* ===== GRID / CONSTELLATION BACKGROUND ===== */
(function() {
  const gc = document.getElementById("grid-canvas");
  const gctx = gc.getContext("2d");
  let gW, gH;
  const dots = [];
  const DOT_COUNT = 55;
  const reduceMotion = window.matchMedia("(prefers-reduced-motion:reduce)").matches;

  function resizeGrid() {
    gW = gc.width = window.innerWidth;
    gH = gc.height = window.innerHeight;
  }
  resizeGrid();
  window.addEventListener("resize", resizeGrid);

  for (let i = 0; i < DOT_COUNT; i++) {
    dots.push({
      x: Math.random() * gW, y: Math.random() * gH,
      r: Math.random() * 1.2 + 0.4,
      vx: (Math.random() - .5) * .22, vy: (Math.random() - .5) * .22,
      opacity: Math.random() * .35 + .1,
    });
  }

  function drawGrid() {
    gctx.clearRect(0, 0, gW, gH);
    if (!document.body.classList.contains("hero-active")) { requestAnimationFrame(drawGrid); return; }

    if (!reduceMotion) dots.forEach(d => { d.x += d.vx; d.y += d.vy; if (d.x < 0) d.x = gW; if (d.x > gW) d.x = 0; if (d.y < 0) d.y = gH; if (d.y > gH) d.y = 0; });

    // lines between close dots
    for (let i = 0; i < dots.length; i++) {
      for (let j = i + 1; j < dots.length; j++) {
        const dx = dots[i].x - dots[j].x, dy = dots[i].y - dots[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 130) {
          gctx.beginPath();
          gctx.moveTo(dots[i].x, dots[i].y);
          gctx.lineTo(dots[j].x, dots[j].y);
          gctx.strokeStyle = `rgba(180,210,240,${.07 * (1 - dist/130)})`;
          gctx.lineWidth = .5;
          gctx.stroke();
        }
      }
    }
    dots.forEach(d => {
      gctx.beginPath();
      gctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
      gctx.fillStyle = `rgba(180,210,240,${d.opacity})`;
      gctx.fill();
    });
    requestAnimationFrame(drawGrid);
  }
  drawGrid();
})();

/* ===== CURSOR PARTICLES ===== */
const dot = document.getElementById("cursorDot");
const cursorGlow = document.getElementById("cursorGlow");
const canvas = document.getElementById("cursor-canvas");
const ctx = canvas.getContext("2d");
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener("resize", () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });

let mouseX = W/2, mouseY = H/2;
let particles = [];
const reduceMotion = window.matchMedia("(prefers-reduced-motion:reduce)").matches;

window.addEventListener("mousemove", (e) => {
  mouseX = e.clientX; mouseY = e.clientY;
  dot.style.left = mouseX + "px";
  dot.style.top  = mouseY + "px";
  cursorGlow.style.left = mouseX + "px";
  cursorGlow.style.top  = mouseY + "px";

  if (!reduceMotion && document.body.classList.contains("hero-active")) {
    for (let i = 0; i < 2; i++) {
      particles.push({
        x: mouseX + (Math.random()-.5)*4,
        y: mouseY + (Math.random()-.5)*4,
        r: Math.random()*2.5 + 1,
        life: 1,
        vx: (Math.random()-.5)*.5,
        vy: (Math.random()-.5)*.5 - .15,
        hue: Math.random() > .5 ? "132,88,179" : "126,207,239",
      });
    }
    if (particles.length > 140) particles.splice(0, particles.length - 140);
  }
});
window.addEventListener("mousedown", () => dot.style.transform = "translate(-50%,-50%) scale(.65)");
window.addEventListener("mouseup",   () => dot.style.transform = "translate(-50%,-50%) scale(1)");

function animateParticles() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life -= .025;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(p.r * p.life, 0), 0, Math.PI*2);
    ctx.fillStyle = `rgba(${p.hue},${p.life*.5})`;
    ctx.fill();
  });
  particles = particles.filter(p => p.life > 0);
  requestAnimationFrame(animateParticles);
}
animateParticles();

// hover states
const hoverables = "button, a, .corner, .toc-item, .skill-chip, .project-card";
document.addEventListener("mouseover", e => { if (e.target.closest(hoverables)) dot.classList.add("hover"); });
document.addEventListener("mouseout",  e => { if (e.target.closest(hoverables)) dot.classList.remove("hover"); });

/* ===== BOOK LOGIC ===== */

const bookClosed = document.getElementById("bookClosed");
const bookOpenWrap = document.getElementById("bookOpenWrap");

const bookClose  = document.getElementById("bookClose");
const staticLeft = document.getElementById("staticLeft");
const staticRight= document.getElementById("staticRight");
const cornerNext = document.getElementById("cornerNext");
const cornerPrev = document.getElementById("cornerPrev");
const progressFill = document.getElementById("progressFill");

const NUM_LEAVES = 4;
let currentSpread = 0;

function getTpl(id) {
  const t = document.getElementById("tpl-" + id);
  return t ? t.content.cloneNode(true) : document.createElement("div");
}
function fillSlot(el, id) {
  el.innerHTML = "";
  el.appendChild(getTpl(id));
}

const leaves = [];
for (let i = 0; i < NUM_LEAVES; i++) {
  const leafEl = document.getElementById("leaf" + i);
  fillSlot(leafEl.querySelector(".leaf-front"), "r" + i);
  fillSlot(leafEl.querySelector(".leaf-back"),  "l" + (i+1));
  leaves.push(leafEl);
}
fillSlot(staticLeft,  "l0");
fillSlot(staticRight, "r0");

function triggerReveal(el) {
  const pc = el.querySelector(".page-content");
  if (!pc) return;
  pc.classList.remove("revealed");
  requestAnimationFrame(() => requestAnimationFrame(() => pc.classList.add("revealed")));
}

function updateProgress() {
  progressFill.style.width = (currentSpread / NUM_LEAVES * 100) + "%";
}

function renderSpread() {
  for (let i = 0; i < NUM_LEAVES; i++) {
    const wasFlipped = leaves[i].classList.contains("flipped");
    const shouldFlip = i < currentSpread;
    leaves[i].classList.toggle("flipped", shouldFlip);
    leaves[i].style.zIndex = currentSpread > i ? 10 + i : 20 - i;

    if (shouldFlip !== wasFlipped) {
      setTimeout(() => {
        const face = shouldFlip ? leaves[i].querySelector(".leaf-back") : leaves[i].querySelector(".leaf-front");
        triggerReveal(face);
      }, 500);
    }
  }
  updateProgress();
}
renderSpread();

function goNext() { if (currentSpread < NUM_LEAVES) { currentSpread++; renderSpread(); } }
function goPrev() { if (currentSpread > 0) { currentSpread--; renderSpread(); } }

const pageMap = { 0:0, 1:1, 2:1, 3:2, 4:2, 5:3, 6:3, 7:4 };

document.querySelectorAll(".nav-link").forEach(btn => {
  btn.addEventListener("click", () => {
    const target = pageMap[btn.dataset.page] ?? 0;
    currentSpread = target; renderSpread();
    document.querySelectorAll(".nav-link").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  });
});

// TOC delegated (works on cloned templates)
document.addEventListener("click", e => {
  const item = e.target.closest(".toc-item");
  if (item) { const target = pageMap[item.dataset.goto] ?? 0; currentSpread = target; renderSpread(); }
});

cornerNext.addEventListener("click", goNext);
cornerPrev.addEventListener("click", goPrev);

window.addEventListener("keydown", e => {
  if (!bookOpenWrap.classList.contains("show")) return;
  if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); goNext(); }
  if (e.key === "ArrowLeft") { e.preventDefault(); goPrev(); }
  if (e.key === "Escape") closeBook();
});

function openBook() {
  hero.classList.add("hidden");
  bookOpenWrap.classList.add("show");
  nav.classList.add("show");
  document.body.classList.remove("hero-active");
  currentSpread = 0; renderSpread();
  // reveal first visible pages
  setTimeout(() => {
    triggerReveal(staticRight);
    triggerReveal(leaves[0].querySelector(".leaf-front"));
  }, 300);
}

function closeBook() {
  bookOpenWrap.classList.remove("show");
  nav.classList.remove("show");
  setTimeout(() => {
    hero.classList.remove("hidden");
    document.body.classList.add("hero-active");
  }, 250);
}

document.body.classList.add("hero-active");
bookClosed.addEventListener("click", openBook);
bookClose.addEventListener("click", closeBook);

// touch / swipe
let touchStartX = 0;
bookOpenWrap.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; }, {passive:true});
bookOpenWrap.addEventListener("touchend", e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) { if (diff > 0) goNext(); else goPrev(); }
}, {passive:true});
    </script>
  </body>
</html>
